<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>P2P Manual - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-5 flex flex-col items-center font-sans">

    <div class="w-full max-w-md bg-white rounded-lg shadow-lg flex flex-col h-[90vh]">
        <div class="bg-blue-600 p-4 text-white rounded-t-lg flex justify-between">
            <span class="font-bold">Chat P2P Manual</span>
            <span id="status" class="text-xs uppercase font-bold text-red-200">Offline</span>
        </div>

        <div id="box" class="flex-1 p-4 overflow-y-auto bg-gray-50 space-y-2 text-sm">
            <div class="bg-yellow-100 p-2 rounded text-xs">
                <b>Cara Pakai:</b><br>
                1. Klik "Buat Undangan" di HP.<br>
                2. Copy kode yang muncul, kirim ke Laptop.<br>
                3. Laptop Paste kode di kotak bawah, klik "Terima Undangan".<br>
                4. Laptop Copy "Kode Balasan", kirim balik ke HP.<br>
                5. HP Paste di kotak bawah, klik "Selesaikan".
            </div>
        </div>

        <!-- Area Input Kode Sinyal -->
        <div class="p-3 border-t bg-gray-100 space-y-2">
            <textarea id="signalInput" class="w-full text-[10px] p-1 h-16 border rounded" placeholder="Paste kode di sini..."></textarea>
            <div class="flex gap-1">
                <button onclick="createOffer()" class="bg-blue-500 text-white text-[10px] px-2 py-1 rounded">1. Buat Undangan</button>
                <button onclick="acceptSignal()" class="bg-green-500 text-white text-[10px] px-2 py-1 rounded">2. Terima/Selesaikan</button>
            </div>
        </div>

        <div class="p-3 border-t flex gap-2">
            <input type="text" id="msg" class="flex-1 border p-2 rounded" placeholder="Ketik...">
            <button onclick="send()" class="bg-blue-600 text-white px-4 py-2 rounded">Kirim</button>
        </div>
    </div>

    <script>
        let pc = new RTCPeerConnection({ iceServers: [{urls:"stun:stun.l.google.com:19302"}] });
        let dc;

        // Inisialisasi Data Channel
        function setupDC() {
            dc.onopen = () => {
                document.getElementById('status').innerText = "Online";
                document.getElementById('status').classList.replace('text-red-200', 'text-green-400');
                addMsg("Sistem", "Terhubung secara Peer-to-Peer!", "in");
            };
            dc.onmessage = e => {
                let data = JSON.parse(e.data);
                addMsg(data.u, data.t, 'in');
            };
        }

        // 1. Membuat Offer (Undangan)
        async function createOffer() {
            dc = pc.createDataChannel("chat");
            setupDC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            
            // Tunggu ICE Gathering selesai (cara manual paling stabil)
            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    document.getElementById('signalInput').value = JSON.stringify(pc.localDescription);
                    addMsg("Sistem", "Kode Undangan dibuat. Salin dan kirim ke teman.", "in");
                }
            };
        }

        // 2. Menerima Sinyal (Offer atau Answer)
        async function acceptSignal() {
            const input = document.getElementById('signalInput').value;
            if (!input) return alert("Paste kode dulu!");
            const signal = JSON.parse(input);

            if (signal.type === "offer") {
                pc.ondatachannel = (e) => {
                    dc = e.channel;
                    setupDC();
                };
                await pc.setRemoteDescription(new RTCSessionDescription(signal));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                
                pc.onicecandidate = (e) => {
                    if (!e.candidate) {
                        document.getElementById('signalInput').value = JSON.stringify(pc.localDescription);
                        addMsg("Sistem", "Kode Balasan dibuat. Salin dan kirim balik ke pengundang.", "in");
                    }
                };
            } else if (signal.type === "answer") {
                await pc.setRemoteDescription(new RTCSessionDescription(signal));
                addMsg("Sistem", "Proses selesai. Menunggu koneksi...", "in");
            }
        }

        function send() {
            let inp = document.getElementById('msg');
            if(!dc || dc.readyState !== 'open') return alert("Belum terhubung!");
            let data = {u: "User", t: inp.value};
            dc.send(JSON.stringify(data));
            addMsg("Saya", inp.value, 'out');
            inp.value = "";
        }

        function addMsg(u, t, s) {
            let b = document.getElementById('box');
            b.innerHTML += `<div class="${s==='out'?'text-right':''} mb-2"><b>${u}:</b> ${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
