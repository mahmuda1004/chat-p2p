<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Private Chat - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #008069; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center font-sans p-2">

    <!-- SCREEN 1: LOGIN (LANDING PAGE) -->
    <div id="loginScreen" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#008069]">P2P Chat</h1>
            <p class="text-gray-500 text-sm">Privat & Tanpa Server</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Nama Anda</label>
                <input type="text" id="nameInput" class="w-full p-3 bg-gray-100 rounded-lg outline-none focus:ring-2 focus:ring-[#008069]" placeholder="Contoh: Mahmuda">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-400 uppercase">Nama Ruangan (Kunci)</label>
                <input type="text" id="roomInput" class="w-full p-3 bg-gray-100 rounded-lg outline-none focus:ring-2 focus:ring-[#008069]" placeholder="Contoh: rahasia123">
                <p class="text-[10px] text-gray-400 mt-1">*Hanya orang dengan kunci yang sama yang bisa chat.</p>
            </div>
            <button onclick="joinChat()" class="w-full bg-[#00a884] text-white p-4 rounded-lg font-bold hover:bg-[#008069] transition-all shadow-lg active:scale-95">MASUK CHAT</button>
        </div>
    </div>

    <!-- SCREEN 2: CHAT INTERFACE (HIDDEN BY DEFAULT) -->
    <div id="chatScreen" class="hidden w-full max-w-md bg-[#f0f2f5] h-full flex flex-col rounded-2xl overflow-hidden shadow-2xl border border-gray-700">
        <!-- Header -->
        <div class="bg-[#008069] p-4 text-white flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold uppercase border-2 border-white/50 text-xl">?</div>
                <div>
                    <h1 id="currentRoom" class="font-bold text-sm leading-none">Ruangan</h1>
                    <p id="status" class="text-[10px] opacity-80 mt-1">Mencari teman...</p>
                </div>
            </div>
            <span id="connCount" class="text-[10px] bg-black/20 px-3 py-1 rounded-full border border-white/20">0 Online</span>
        </div>

        <!-- Chat Area -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-[#e5ddd5]" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');"></div>

        <!-- Input -->
        <div class="p-3 bg-[#f0f2f5] flex items-center gap-2 border-t border-gray-300">
            <input type="text" id="msgInp" class="flex-1 p-3 rounded-full outline-none text-sm shadow-inner" placeholder="Tulis sesuatu...">
            <button onclick="sendTxt()" class="bg-[#00a884] text-white p-4 rounded-full shadow-md active:scale-90 transition-all">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCkXFfGeA2KuDqNoNU5A7Q-FPLI-YpURHk",
            authDomain: "realtime-database-f4102.firebaseapp.com",
            databaseURL: "https://realtime-database-f4102-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "realtime-database-f4102",
            appId: "1:433163571380:web:ad65f64f7b5f892c5d07e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = Math.random().toString(36).substring(7);
        let myName, myRoom, peers = {};

        function joinChat() {
            myName = document.getElementById('nameInput').value;
            myRoom = document.getElementById('roomInput').value;
            
            if(!myName || !myRoom) return alert("Isi Nama & Ruangan!");

            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('chatScreen').classList.remove('hidden');
            document.getElementById('avatar').innerText = myName[0];
            document.getElementById('currentRoom').innerText = "Room: " + myRoom;

            startP2P();
        }

        function startP2P() {
            // Jalur Signaling berdasarkan Room (Keamanan Tambahan)
            const signalsRef = db.ref(`signals/${myRoom}/${myId}`);
            const presenceRef = db.ref(`presence/${myRoom}/${myId}`);

            // 1. Terima Sinyal
            signalsRef.on('child_added', async (snap) => {
                const data = snap.val();
                if (data.type === 'offer') {
                    const pc = setupPeer(data.from, false);
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref(`signals/${myRoom}/${data.from}`).push({ from: myId, type: 'answer', sdp: ans });
                } else if (data.type === 'answer') {
                    if (peers[data.from]) await peers[data.from].pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                } else if (data.type === 'ice') {
                    if (peers[data.from]) peers[data.from].pc.addIceCandidate(new RTCIceCandidate(data.ice));
                }
                snap.ref.remove(); // AUTO CLEANUP: Hapus setelah dibaca
            });

            // 2. Presence Online
            presenceRef.set({ name: myName });
            presenceRef.onDisconnect().remove();

            db.ref(`presence/${myRoom}`).on('value', (snap) => {
                const list = snap.val() || {};
                document.getElementById('connCount').innerText = (Object.keys(list).length) + " Online";
                
                Object.keys(list).forEach(peerId => {
                    if (peerId !== myId && !peers[peerId]) setupPeer(peerId, true);
                });
            });
        }

        function setupPeer(peerId, isOffer) {
            const pc = new RTCPeerConnection({ iceServers: [{ urls: "stun:stun.l.google.com:19302" }] });
            peers[peerId] = { pc, dc: null };

            pc.onicecandidate = (e) => {
                if (e.candidate) db.ref(`signals/${myRoom}/${peerId}`).push({ from: myId, type: 'ice', ice: e.candidate });
            };

            if (isOffer) {
                const dc = pc.createDataChannel("chat");
                setupDC(dc, peerId);
                pc.createOffer().then(o => {
                    pc.setLocalDescription(o);
                    db.ref(`signals/${myRoom}/${peerId}`).push({ from: myId, type: 'offer', sdp: o });
                });
            } else {
                pc.ondatachannel = (e) => setupDC(e.channel, peerId);
            }
            return pc;
        }

        function setupDC(dc, peerId) {
            peers[peerId].dc = dc;
            dc.onopen = () => updateUI();
            dc.onclose = () => { delete peers[peerId]; updateUI(); };
            dc.onmessage = (e) => {
                const m = JSON.parse(e.data);
                appendMsg(m.u, m.t, 'inbound');
            };
        }

        function updateUI() {
            const active = Object.values(peers).filter(p => p.dc?.readyState === 'open').length;
            document.getElementById('status').innerText = active > 0 ? `Terhubung ke ${active} teman` : "Mencari teman...";
        }

        function sendTxt() {
            const inp = document.getElementById('msgInp');
            if(!inp.value.trim()) return;
            Object.values(peers).forEach(p => p.dc?.readyState === 'open' && p.dc.send(JSON.stringify({u:myName, t:inp.value})));
            appendMsg(myName, inp.value, 'outbound');
            inp.value = "";
        }

        function appendMsg(u, t, side) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = side === 'outbound' ? "bg-[#dcf8c6] self-end p-2 rounded-lg shadow-sm text-sm max-w-[85%]" : "bg-white self-start p-2 rounded-lg shadow-sm text-sm max-w-[85%]";
            div.innerHTML = `<b class="text-[10px] block text-gray-500">${u}</b>${t}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('msgInp').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendTxt(); });
    </script>
</body>
</html>
