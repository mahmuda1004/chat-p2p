<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat P2P - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-gray-100 p-5 flex flex-col items-center font-sans">

    <div id="setup" class="bg-white p-6 rounded-lg shadow-md w-full max-w-sm">
        <h2 class="text-xl font-bold mb-4 text-center">Masuk Chat</h2>
        <input type="text" id="name" placeholder="Nama" class="w-full border p-2 mb-2 rounded">
        <input type="text" id="room" placeholder="Kode Ruang" class="w-full border p-2 mb-4 rounded">
        <button onclick="start()" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">Gabung</button>
    </div>

    <div id="main" class="hidden w-full max-w-md bg-white rounded-lg shadow-lg flex flex-col h-[80vh]">
        <div class="bg-blue-600 p-4 text-white rounded-t-lg flex justify-between">
            <span id="roomTitle">Ruang</span>
            <span id="status" class="text-xs uppercase font-bold">Offline</span>
        </div>
        <div id="box" class="flex-1 p-4 overflow-y-auto bg-gray-50 space-y-2 text-sm"></div>
        <div class="p-3 border-t flex gap-2">
            <input type="text" id="msg" class="flex-1 border p-2 rounded" placeholder="Ketik...">
            <button onclick="send()" class="bg-green-500 text-white px-4 py-2 rounded">Kirim</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyCkXFfGeA2KuDqNoNU5A7Q-FPLI-YpURHk",
            authDomain: "realtime-database-f4102.firebaseapp.com",
            databaseURL: "https://realtime-database-f4102-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "realtime-database-f4102"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let myId = Math.random().toString(36).substr(7), myName, myRoom, peers = {};

        function start() {
            myName = document.getElementById('name').value;
            myRoom = document.getElementById('room').value;
            if(!myName || !myRoom) return;
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('main').classList.remove('hidden');
            document.getElementById('roomTitle').innerText = "Ruang: " + myRoom;

            // Signaling
            db.ref(`signals/${myRoom}/${myId}`).on('child_added', async snap => {
                let d = snap.val();
                if(d.type === 'offer') {
                    let pc = getPC(d.from, false);
                    await pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
                    let ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref(`signals/${myRoom}/${d.from}`).push({from:myId, type:'answer', sdp:ans});
                } else if(d.type === 'answer') {
                    if(peers[d.from]) await peers[d.from].pc.setRemoteDescription(new RTCSessionDescription(d.sdp));
                } else if(d.type === 'ice') {
                    if(peers[d.from]) peers[d.from].pc.addIceCandidate(new RTCIceCandidate(d.ice));
                }
                snap.ref.remove();
            });

            db.ref(`presence/${myRoom}`).on('value', snap => {
                let list = snap.val() || {};
                Object.keys(list).forEach(id => {
                    if(id !== myId && !peers[id]) getPC(id, myId < id);
                });
            });
            db.ref(`presence/${myRoom}/${myId}`).set(true).then(() => {
                db.ref(`presence/${myRoom}/${myId}`).onDisconnect().remove();
            });
        }

        function getPC(id, caller) {
            let pc = new RTCPeerConnection({ iceServers: [{urls:"stun:stun.l.google.com:19302"}] });
            let dc = pc.createDataChannel("chat", {negotiated:true, id:0});
            peers[id] = {pc, dc};

            dc.onopen = () => document.getElementById('status').innerText = "Online";
            dc.onmessage = e => addMsg(JSON.parse(e.data).u, JSON.parse(e.data).t, 'in');
            pc.onicecandidate = e => {
                if(e.candidate) db.ref(`signals/${myRoom}/${id}`).push({from:myId, type:'ice', ice:e.candidate});
            };

            if(caller) {
                pc.createOffer().then(o => pc.setLocalDescription(o)).then(() => {
                    db.ref(`signals/${myRoom}/${id}`).push({from:myId, type:'offer', sdp:pc.localDescription});
                });
            }
            return pc;
        }

        function send() {
            let inp = document.getElementById('msg');
            let data = {u:myName, t:inp.value};
            Object.values(peers).forEach(p => p.dc.readyState === 'open' && p.dc.send(JSON.stringify(data)));
            addMsg(myName, inp.value, 'out');
            inp.value = "";
        }

        function addMsg(u, t, s) {
            let b = document.getElementById('box');
            b.innerHTML += `<div class="${s==='out'?'text-right':''} mb-2"><b>${u}:</b> ${t}</div>`;
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
