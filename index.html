<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual P2P - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #box::-webkit-scrollbar { width: 4px; }
        #box::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 h-screen flex items-center justify-center p-4 font-sans">

    <div class="w-full max-w-md bg-white rounded-[2rem] shadow-2xl flex flex-col h-[90vh] overflow-hidden border border-slate-100">
        <!-- Header -->
        <div class="p-6 border-b flex justify-between items-center bg-white">
            <div>
                <h1 class="text-xl font-black text-slate-800 tracking-tight">Direct Chat</h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="statusDot" class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span id="status" class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Offline</span>
                </div>
            </div>
            <button onclick="location.reload()" class="p-2 hover:bg-slate-100 rounded-full transition">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>

        <!-- Box Chat -->
        <div id="box" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50/50">
            <div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl text-[11px] text-blue-700 leading-relaxed">
                <p class="font-bold mb-1 uppercase tracking-tighter">Instruksi Manual:</p>
                1. Klik <b class="text-blue-900">Buat Undangan</b> (HP/Laptop).<br>
                2. Copy kodenya, kirim ke perangkat lain.<br>
                3. Paste di perangkat lain, klik <b class="text-blue-900">Terima/Balas</b>.<br>
                4. Kirim balik kode balasan ke perangkat pertama & Paste.
            </div>
        </div>

        <!-- Signaling Area (Manual) -->
        <div class="p-6 border-t bg-white space-y-3">
            <textarea id="signalInput" class="w-full text-[10px] p-3 h-20 bg-slate-50 border-none rounded-xl outline-none focus:ring-2 focus:ring-blue-500/20 transition-all font-mono" placeholder="Tempel kode di sini..."></textarea>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="createOffer()" class="bg-slate-800 text-white text-[10px] font-bold p-3 rounded-xl hover:bg-black transition-all uppercase tracking-wider">1. Buat Undangan</button>
                <button onclick="acceptSignal()" class="bg-blue-600 text-white text-[10px] font-bold p-3 rounded-xl hover:bg-blue-700 transition-all uppercase tracking-wider shadow-lg shadow-blue-100">2. Terima / Balas</button>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="p-6 bg-white border-t flex gap-2">
            <input type="text" id="msg" class="flex-1 bg-slate-100 p-4 rounded-2xl outline-none text-sm focus:bg-white focus:ring-2 focus:ring-blue-500/20 transition-all" placeholder="Tulis pesan...">
            <button onclick="send()" class="bg-blue-600 text-white p-4 rounded-2xl hover:scale-95 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </div>
    </div>

    <script>
        let pc = new RTCPeerConnection({ iceServers: [{urls:"stun:stun.l.google.com:19302"}] });
        let dc;

        function setupDC() {
            dc.onopen = () => {
                document.getElementById('status').innerText = "Terhubung";
                document.getElementById('status').classList.replace('text-slate-400', 'text-green-600');
                document.getElementById('statusDot').classList.replace('bg-red-500', 'bg-green-500');
                addMsg("Sistem", "Koneksi Aman & Langsung Berhasil!", "in");
            };
            dc.onmessage = e => {
                let data = JSON.parse(e.data);
                addMsg("Teman", data.t, 'in');
            };
        }

        async function createOffer() {
            dc = pc.createDataChannel("chat");
            setupDC();
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            pc.onicecandidate = (e) => {
                if (!e.candidate) {
                    document.getElementById('signalInput').value = btoa(JSON.stringify(pc.localDescription));
                    addMsg("Sistem", "Kode undangan (Base64) siap. Salin & kirim!", "in");
                }
            };
        }

        async function acceptSignal() {
            const input = document.getElementById('signalInput').value;
            if (!input) return alert("Tempel kode dulu!");
            try {
                const signal = JSON.parse(atob(input));
                if (signal.type === "offer") {
                    pc.ondatachannel = (e) => { dc = e.channel; setupDC(); };
                    await pc.setRemoteDescription(new RTCSessionDescription(signal));
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    pc.onicecandidate = (e) => {
                        if (!e.candidate) {
                            document.getElementById('signalInput').value = btoa(JSON.stringify(pc.localDescription));
                            addMsg("Sistem", "Kode balasan siap. Kirim balik!", "in");
                        }
                    };
                } else {
                    await pc.setRemoteDescription(new RTCSessionDescription(signal));
                }
            } catch(e) { alert("Kode tidak valid!"); }
        }

        function send() {
            let inp = document.getElementById('msg');
            if(!dc || dc.readyState !== 'open') return;
            dc.send(JSON.stringify({t: inp.value}));
            addMsg("Saya", inp.value, 'out');
            inp.value = "";
        }

        function addMsg(u, t, s) {
            let b = document.getElementById('box');
            let isOut = s === 'out';
            b.innerHTML += `
                <div class="flex flex-col ${isOut ? 'items-end' : 'items-start'}">
                    <div class="max-w-[80%] ${isOut ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none' : 'bg-white border border-slate-200 text-slate-800 rounded-2xl rounded-tl-none'} p-3 shadow-sm text-sm">
                        <p class="text-[9px] font-bold mb-1 opacity-70">${u}</p>
                        <p>${t}</p>
                    </div>
                </div>`;
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
