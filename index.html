<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Pro - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background-color: #0f172a;
      }
      #chatBox {
        background-image: url("https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png");
        background-blend-mode: overlay;
      }
      .hide-scroll::-webkit-scrollbar {
        width: 0px;
        background: transparent;
      }
      .msg-bubble {
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
      }
      /* Animasi Menu Kustom */
      #customMenu {
        display: none;
        position: fixed;
        z-index: 100;
      }
    </style>
  </head>
  <body
    class="h-screen flex items-center justify-center p-2 font-sans overflow-hidden"
    onclick="closeMenu()"
  >
    <!-- LOGIN SCREEN -->
    <div
      id="loginScreen"
      class="w-full max-w-md bg-white p-8 rounded-3xl shadow-2xl"
    >
      <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-[#008069]">P2P CHAT</h1>
        <p
          class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1"
        >
          Direct Connection
        </p>
      </div>
      <div class="space-y-4">
        <input
          type="text"
          id="nameInput"
          class="w-full p-4 bg-gray-100 rounded-2xl outline-none border-2 border-transparent focus:border-[#00a884]"
          placeholder="Nama Anda"
        />
        <button
          onclick="joinChat()"
          class="w-full bg-[#00a884] text-white p-4 rounded-2xl font-bold hover:bg-[#008069] active:scale-95 uppercase transition-all shadow-lg"
        >
          Mulai
        </button>
      </div>
    </div>

    <!-- CUSTOM MENU -->
    <div
      id="customMenu"
      class="bg-white shadow-2xl rounded-2xl overflow-hidden border border-gray-100 w-40"
    >
      <button
        onclick="triggerEdit()"
        class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 flex items-center gap-2 border-b"
      >
        <span>✏️</span> Edit
      </button>
      <button
        onclick="triggerDelete()"
        class="w-full text-left px-4 py-3 text-sm hover:bg-red-50 text-red-600 flex items-center gap-2 border-b"
      >
        <span>🗑️</span> Hapus
      </button>
      <button
        onclick="closeMenu()"
        class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 text-gray-400 flex items-center gap-2"
      >
        <span>✖️</span> Batal
      </button>
    </div>

    <!-- CHAT INTERFACE -->
    <div
      id="chatScreen"
      class="hidden w-full max-w-md bg-[#f0f2f5] h-[95vh] flex flex-col rounded-3xl overflow-hidden shadow-2xl relative border border-white/10"
    >
      <!-- Header -->
      <div
        class="bg-[#008069] p-4 text-white flex justify-between items-center z-20 shadow-md"
      >
        <div class="flex items-center gap-3">
          <div
            id="avatar"
            class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold border border-white/30 text-xl uppercase italic"
          >
            M
          </div>
          <div>
            <h1
              id="userNameDisplay"
              class="font-bold text-sm leading-none italic uppercase"
            >
              User
            </h1>
            <p
              id="status"
              class="text-[10px] opacity-80 mt-1 italic font-medium uppercase tracking-widest"
            >
              Offline
            </p>
          </div>
        </div>
        <div class="flex gap-2">
          <button
            id="toggleBtn"
            onclick="toggleSignal()"
            class="w-10 h-10 bg-white/10 rounded-full hover:bg-white/20 font-bold text-2xl flex items-center justify-center"
          >
            +
          </button>
          <button
            onclick="confirmReset()"
            class="p-2 bg-red-500/20 rounded-full hover:bg-red-500/40 text-[10px] font-bold px-3 uppercase"
          >
            Reset
          </button>
        </div>
      </div>

      <!-- Signaling Area -->
      <div
        id="signalArea"
        class="absolute inset-x-0 top-[72px] bg-white p-4 z-10 shadow-xl border-b transition-all duration-300"
      >
        <div class="flex justify-between items-center mb-2">
          <span class="text-[10px] font-bold text-gray-400 uppercase"
            >Panel Koneksi</span
          >
          <button
            onclick="copySignal()"
            id="copyBtn"
            class="hidden text-[10px] bg-blue-600 text-white px-3 py-1 rounded-md font-bold uppercase"
          >
            Salin Kode
          </button>
        </div>
        <textarea
          id="signalInp"
          class="w-full h-24 text-[9px] p-3 rounded-xl border border-gray-200 outline-none font-mono bg-gray-50 mb-2"
          placeholder="Tempel kode di sini..."
        ></textarea>
        <div class="flex gap-2">
          <button
            onclick="createOffer()"
            class="flex-1 bg-slate-800 text-white text-[10px] font-bold py-2 rounded-lg uppercase"
          >
            1. Buat Undangan
          </button>
          <button
            onclick="acceptSignal()"
            class="flex-1 bg-[#00a884] text-white text-[10px] font-bold py-2 rounded-lg uppercase"
          >
            2. Terima & Balas
          </button>
        </div>
        <div
          id="signalNote"
          class="mt-3 p-3 rounded-lg bg-gray-100 text-[10px] text-center border border-dashed border-gray-300 transition-all"
        >
          Klik <b>"Buat Undangan"</b> untuk memulai.
        </div>
      </div>

      <!-- Chat Box -->
      <div
        id="chatBox"
        class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-[#e5ddd5] hide-scroll pt-44"
      ></div>

      <!-- Input Area -->
      <div class="p-4 bg-[#f0f2f5] flex items-center gap-3 border-t">
        <input
          type="text"
          id="msgInp"
          onkeydown="handleEnter(event)"
          class="flex-1 p-3 rounded-2xl outline-none text-sm shadow-inner disabled:bg-gray-200"
          placeholder="Ketik pesan..."
          disabled
        />
        <button
          id="sendBtn"
          onclick="sendTxt()"
          class="bg-[#00a884] text-white p-3 rounded-2xl shadow-md disabled:opacity-30 active:scale-90"
          disabled
        >
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>

    <script>
      let myName, pc, dc;
      let editingId = null;
      let selectedMsgId = null;
      let selectedMsgText = "";

      // Fungsi Notifikasi Status
      function setStatusNote(text, style = "neutral") {
        const note = document.getElementById("signalNote");
        note.innerHTML = text;
        const styles = {
          neutral: "bg-gray-100 border-gray-300 text-gray-500",
          waiting: "bg-yellow-50 border-yellow-300 text-yellow-700 font-medium",
          success: "bg-green-50 border-green-300 text-green-700 font-bold",
        };
        note.className = `mt-3 p-3 rounded-lg text-[10px] text-center border border-dashed ${styles[style]}`;
      }

      function handleEnter(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendTxt();
        }
      }

      function joinChat() {
        myName = document.getElementById("nameInput").value.trim();
        if (!myName) return;
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("chatScreen").classList.remove("hidden");
        document.getElementById("avatar").innerText = myName[0];
        document.getElementById("userNameDisplay").innerText = myName;
        initWebRTC();
      }

      function initWebRTC() {
        pc = new RTCPeerConnection({
          iceServers: [{ urls: "stun:stun.l.google.com:19302" }],
        });
        pc.onicecandidate = (e) => {
          if (!e.candidate) {
            document.getElementById("signalInp").value = btoa(
              JSON.stringify(pc.localDescription),
            );
            document.getElementById("copyBtn").classList.remove("hidden");
            if (pc.localDescription.type === "offer") {
              setStatusNote(
                "KODE UNDANGAN SIAP!<br>Salin dan kirim ke teman.",
                "waiting",
              );
            } else {
              setStatusNote(
                "KODE BALASAN SIAP!<br>Salin dan kirim balik.",
                "waiting",
              );
            }
          }
        };
        pc.onconnectionstatechange = () => {
          if (pc.connectionState === "connected") {
            document.getElementById("status").innerText = "ONLINE";
            document.getElementById("msgInp").disabled = false;
            document.getElementById("sendBtn").disabled = false;
            setStatusNote("TERHUBUNG!", "success");
            setTimeout(() => toggleSignal(false), 1000);
          }
        };
      }

      function setupDC() {
        dc.onopen = () => console.log("DC Open");
        dc.onmessage = (e) => {
          const data = JSON.parse(e.data);
          if (data.type === "chat")
            appendMsg(data.u, data.t, "inbound", data.id);
          if (data.type === "edit") updateMsgUI(data.id, data.t, false);
          if (data.type === "delete") deleteMsgUI(data.id);
        };
      }

      async function createOffer() {
        setStatusNote("Memproses...");
        dc = pc.createDataChannel("chat", { negotiated: true, id: 0 });
        setupDC();
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
      }

      async function acceptSignal() {
        const val = document.getElementById("signalInp").value.trim();
        if (!val) return;
        try {
          const signal = JSON.parse(atob(val));
          document.getElementById("signalInp").value = "";
          if (signal.type === "offer") {
            dc = pc.createDataChannel("chat", { negotiated: true, id: 0 });
            setupDC();
            await pc.setRemoteDescription(new RTCSessionDescription(signal));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
          } else {
            await pc.setRemoteDescription(new RTCSessionDescription(signal));
          }
        } catch (e) {
          setStatusNote("Kode salah.", "neutral");
        }
      }

      // FUNGSI MENU KUSTOM
      function openMsgMenu(e, id, text) {
        e.stopPropagation();
        selectedMsgId = id;
        selectedMsgText = text;
        const menu = document.getElementById("customMenu");
        menu.style.display = "block";
        menu.style.left = e.pageX + "px";
        menu.style.top = e.pageY + "px";
      }

      function closeMenu() {
        document.getElementById("customMenu").style.display = "none";
      }

      function triggerEdit() {
        editingId = selectedMsgId;
        document.getElementById("msgInp").value = selectedMsgText;
        document.getElementById("msgInp").focus();
        document.getElementById("msgInp").placeholder = "Mode Edit...";
        closeMenu();
      }

      function triggerDelete() {
        if (confirm("Hapus pesan?")) {
          dc.send(JSON.stringify({ type: "delete", id: selectedMsgId }));
          deleteMsgUI(selectedMsgId);
        }
        closeMenu();
      }

      function sendTxt() {
        const inp = document.getElementById("msgInp");
        const text = inp.value.trim();
        if (!text || !dc || dc.readyState !== "open") return;

        if (editingId) {
          dc.send(JSON.stringify({ type: "edit", id: editingId, t: text }));
          updateMsgUI(editingId, text, true);
          editingId = null;
          inp.placeholder = "Ketik pesan...";
        } else {
          const id = "msg-" + Date.now();
          dc.send(JSON.stringify({ type: "chat", u: myName, t: text, id: id }));
          appendMsg(myName, text, "outbound", id);
        }
        inp.value = "";
      }

      function appendMsg(u, t, side, id) {
        const box = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.id = id;
        const isOut = side === "outbound";

        div.className = isOut
          ? "bg-[#dcf8c6] self-end p-3 rounded-2xl rounded-tr-none shadow-sm text-sm max-w-[85%] mb-1 border-l-4 border-[#00a884] msg-bubble"
          : "bg-white self-start p-3 rounded-2xl rounded-tl-none shadow-sm text-sm max-w-[85%] mb-1 border-l-4 border-blue-500";

        if (isOut) div.onclick = (e) => openMsgMenu(e, id, t);

        div.innerHTML = `<b class="text-[10px] block text-gray-400 uppercase mb-1">${u}</b>
                             <div class="flex items-end justify-between gap-4">
                                <p class="msg-text whitespace-pre-wrap">${t}</p>
                                <div class="flex flex-col items-end">
                                    <span class="edit-label text-[8px] text-gray-400 italic hidden">diedit</span>
                                    ${isOut ? '<span class="text-[#53bdeb] text-[10px]">✓✓</span>' : ""}
                                </div>
                             </div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
      }

      function updateMsgUI(id, newText, isMe) {
        const el = document.getElementById(id);
        if (el) {
          el.querySelector(".msg-text").innerText = newText;
          el.querySelector(".edit-label").classList.remove("hidden");
          if (isMe) el.onclick = (e) => openMsgMenu(e, id, newText);
        }
      }

      function deleteMsgUI(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
      }

      function copySignal() {
        const area = document.getElementById("signalInp");
        area.select();
        navigator.clipboard.writeText(area.value);
        document.getElementById("copyBtn").innerText = "TERSALIN";
        setTimeout(() => {
          document.getElementById("copyBtn").innerText = "SALIN KODE";
        }, 2000);
      }

      function toggleSignal(state = null) {
        const area = document.getElementById("signalArea");
        const btn = document.getElementById("toggleBtn");
        if (state === false || !area.classList.contains("hidden")) {
          area.classList.add("hidden");
          btn.innerText = "+";
        } else {
          area.classList.remove("hidden");
          btn.innerText = "−";
        }
      }

      function confirmReset() {
        if (confirm("Reset?")) location.reload();
      }
    </script>
  </body>
</html>
