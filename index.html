<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Private Chat - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { background-color: #0f172a; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        #chatBox::-webkit-scrollbar { width: 5px; }
        #chatBox::-webkit-scrollbar-thumb { background: #00a884; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center font-sans p-2">

    <!-- SCREEN 1: LOGIN (LANDING PAGE) -->
    <div id="loginScreen" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-2xl transition-all">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-[#008069]">P2P Chat</h1>
            <p class="text-gray-500 text-sm">Privat, Tanpa Server & Enkripsi P2P</p>
        </div>
        <div class="space-y-4">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nama Anda</label>
                <input type="text" id="nameInput" class="w-full p-3 bg-gray-100 rounded-lg outline-none border-2 border-transparent focus:border-[#00a884] transition-all" placeholder="Masukkan nama...">
            </div>
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Nama Ruangan (Kunci)</label>
                <input type="text" id="roomInput" class="w-full p-3 bg-gray-100 rounded-lg outline-none border-2 border-transparent focus:border-[#00a884] transition-all" placeholder="Contoh: rahasia-123">
                <p class="text-[10px] text-gray-400 mt-2 font-medium">Hanya yang memiliki kunci yang sama yang bisa terhubung.</p>
            </div>
            <button onclick="joinChat()" class="w-full bg-[#00a884] text-white p-4 rounded-lg font-bold hover:bg-[#008069] transition-all shadow-lg active:scale-95 uppercase tracking-wider">Mulai Chat</button>
        </div>
    </div>

    <!-- SCREEN 2: CHAT INTERFACE -->
    <div id="chatScreen" class="hidden w-full max-w-md bg-[#f0f2f5] h-[95vh] flex flex-col rounded-2xl overflow-hidden shadow-2xl relative">
        <!-- Header -->
        <div class="bg-[#008069] p-4 text-white flex justify-between items-center shadow-md">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold uppercase border-2 border-white/40 text-xl">?</div>
                <div>
                    <h1 id="currentRoom" class="font-bold text-sm leading-tight">Room</h1>
                    <p id="status" class="text-[10px] opacity-80 italic animate-pulse">Menghubungkan...</p>
                </div>
            </div>
            <div class="text-right">
                <span id="connCount" class="text-[10px] bg-black/20 px-3 py-1 rounded-full border border-white/10 block mb-1">0 Online</span>
                <button onclick="location.reload()" class="text-[9px] underline opacity-60 hover:opacity-100">Keluar</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 flex flex-col bg-[#e5ddd5]" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay;">
            <!-- Pesan akan muncul di sini -->
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-[#f0f2f5] flex items-center gap-2 border-t border-gray-300">
            <input type="text" id="msgInp" class="flex-1 p-3 rounded-full outline-none text-sm shadow-inner border border-transparent focus:border-gray-300" placeholder="Ketik pesan..." autocomplete="off">
            <button id="sendBtn" onclick="sendTxt()" class="bg-[#00a884] text-white p-3 rounded-full shadow-lg active:scale-90 transition-all disabled:bg-gray-300" disabled>
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // --- CONFIGURASI FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyCkXFfGeA2KuDqNoNU5A7Q-FPLI-YpURHk",
            authDomain: "realtime-database-f4102.firebaseapp.com",
            databaseURL: "https://realtime-database-f4102-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "realtime-database-f4102",
            appId: "1:433163571380:web:ad65f64f7b5f892c5d07e1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let myId = Math.random().toString(36).substring(7);
        let myName, myRoom, peers = {};

        function joinChat() {
            myName = document.getElementById('nameInput').value.trim();
            myRoom = document.getElementById('roomInput').value.trim();
            
            if(!myName || !myRoom) return alert("Nama dan Kunci Ruangan wajib diisi!");

            document.getElementById('loginScreen').classList.add('scale-0', 'absolute');
            setTimeout(() => {
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('chatScreen').classList.remove('hidden');
            }, 300);

            document.getElementById('avatar').innerText = myName[0];
            document.getElementById('currentRoom').innerText = "Room: " + myRoom;

            initSignaling();
        }

        function initSignaling() {
            const signalsRef = db.ref(`signals/${myRoom}/${myId}`);
            const presenceRef = db.ref(`presence/${myRoom}/${myId}`);

            // Mendengarkan Sinyal Masuk (Offer, Answer, ICE)
            signalsRef.on('child_added', async (snap) => {
                const data = snap.val();
                if (data.type === 'offer') {
                    const pc = setupPeer(data.from, false);
                    await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    db.ref(`signals/${myRoom}/${data.from}`).push({ from: myId, type: 'answer', sdp: ans });
                } else if (data.type === 'answer') {
                    if (peers[data.from]) await peers[data.from].pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                } else if (data.type === 'ice') {
                    if (peers[data.from]) peers[data.from].pc.addIceCandidate(new RTCIceCandidate(data.ice));
                }
                snap.ref.remove(); // Hapus sinyal agar database bersih
            });

            // Status Online
            presenceRef.set({ name: myName, lastSeen: Date.now() });
            presenceRef.onDisconnect().remove();

            // Pantau siapa saja yang online di ruangan ini
            db.ref(`presence/${myRoom}`).on('value', (snap) => {
                const list = snap.val() || {};
                document.getElementById('connCount').innerText = (Object.keys(list).length) + " Online";
                
                Object.keys(list).forEach(peerId => {
                    if (peerId !== myId && !peers[peerId]) {
                        setupPeer(peerId, true);
                    }
                });
            });
        }

        function setupPeer(peerId, isOffer) {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
            });
            peers[peerId] = { pc: pc, dc: null };

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    db.ref(`signals/${myRoom}/${peerId}`).push({ from: myId, type: 'ice', ice: e.candidate });
                }
            };

            if (isOffer) {
                // Sebagai pembuat koneksi (Caller)
                const dc = pc.createDataChannel("chatChannel");
                setupDC(dc, peerId);
                pc.createOffer().then(o => {
                    pc.setLocalDescription(o);
                    db.ref(`signals/${myRoom}/${peerId}`).push({ from: myId, type: 'offer', sdp: o });
                });
            } else {
                // Sebagai penerima koneksi (Callee)
                pc.ondatachannel = (e) => setupDC(e.channel, peerId);
            }

            pc.onconnectionstatechange = () => {
                if (pc.connectionState === 'disconnected') {
                    delete peers[peerId];
                    updateUI();
                }
            };

            return pc;
        }

        function setupDC(dc, peerId) {
            peers[peerId].dc = dc;
            dc.onopen = () => updateUI();
            dc.onclose = () => { delete peers[peerId]; updateUI(); };
            dc.onmessage = (e) => {
                const msgObj = JSON.parse(e.data); // Decode kembali dari string ke object
                appendMsg(msgObj.u, msgObj.t, 'inbound');
            };
        }

        function updateUI() {
            const active = Object.values(peers).filter(p => p.dc?.readyState === 'open').length;
            const statusEl = document.getElementById('status');
            const btn = document.getElementById('sendBtn');
            
            if (active > 0) {
                statusEl.innerText = `Terhubung ke ${active} teman`;
                statusEl.className = "text-[10px] text-yellow-300 font-bold animate-pulse";
                btn.disabled = false;
            } else {
                statusEl.innerText = "Mencari teman...";
                statusEl.className = "text-[10px] opacity-80 italic";
                btn.disabled = true;
            }
        }

        function sendTxt() {
            const inp = document.getElementById('msgInp');
            const text = inp.value.trim();
            if(!text) return;
            
            const payload = JSON.stringify({ u: myName, t: text }); // Bungkus jadi string
            
            let success = false;
            Object.values(peers).forEach(p => {
                if (p.dc && p.dc.readyState === 'open') {
                    p.dc.send(payload);
                    success = true;
                }
            });

            appendMsg(myName, text, 'outbound');
            inp.value = "";
        }

        function appendMsg(u, t, side) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            
            if (side === 'outbound') {
                div.className = "bg-[#dcf8c6] self-end p-2 px-3 rounded-lg shadow-sm text-sm max-w-[85%] mb-2 border-l-4 border-[#00a884] animate-fade-in";
            } else {
                div.className = "bg-white self-start p-2 px-3 rounded-lg shadow-sm text-sm max-w-[85%] mb-2 border-l-4 border-blue-500 animate-fade-in";
            }
            
            div.innerHTML = `<b class="text-[10px] block text-gray-500 mb-1 uppercase">${u}</b><p class="leading-relaxed">${t}</p>`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        // Shortcut Enter untuk kirim
        document.getElementById('msgInp').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendTxt();
        });
    </script>
</body>
</html>
