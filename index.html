<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Chat Lab - Mahmuda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body class="bg-[#dadbd3] h-screen flex flex-col items-center font-sans">

    <div class="w-full max-w-md bg-[#f0f2f5] flex flex-col h-full shadow-2xl relative">
        <!-- Header -->
        <div class="bg-[#008069] p-4 text-white flex justify-between items-center z-20 shadow-md">
            <div class="flex items-center gap-3">
                <div id="avatar" class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold uppercase border-2 border-white/50">?</div>
                <div>
                    <h1 id="userNameDisplay" class="font-bold text-sm italic">Memuat...</h1>
                    <p id="status" class="text-[10px] opacity-90 font-mono">ID: <span id="myIdDisplay"></span></p>
                </div>
            </div>
            <div class="text-right">
                <span id="connCount" class="text-[10px] bg-black/20 px-2 py-1 rounded-full block mb-1 text-center">0 Online</span>
                <button onclick="location.reload()" class="text-[9px] underline opacity-70">Muat Ulang</button>
            </div>
        </div>

        <!-- Chat Box -->
        <div id="chatBox" class="flex-1 overflow-y-auto p-4 flex flex-col gap-2 bg-[#e5ddd5]" style="background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');">
            <div class="bg-yellow-100 p-2 text-[11px] text-center rounded border border-yellow-200 text-yellow-800 shadow-sm">
                <b>Sistem P2P Aktif.</b> Jika status tetap "Mencari", pastikan satu perangkat menggunakan Wi-Fi dan satu lagi menggunakan Data Seluler.
            </div>
        </div>

        <!-- Log Monitor (Untuk Debugging) -->
        <div id="logBox" class="h-20 bg-black text-green-400 text-[9px] p-2 overflow-y-auto font-mono opacity-80 border-t border-gray-700">
            > Memulai sistem...
        </div>

        <!-- Input Area -->
        <div class="p-3 bg-[#f0f2f5] flex items-center gap-2 border-t">
            <input type="text" id="msgInp" class="flex-1 p-2 rounded-full outline-none text-sm shadow-inner" placeholder="Ketik pesan..." autocomplete="off">
            <button id="sendBtn" onclick="sendTxt()" class="bg-[#00a884] text-white p-3 rounded-full shadow-lg disabled:bg-gray-400 transition-all active:scale-90" disabled>
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        // 1. KONFIGURASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCkXFfGeA2KuDqNoNU5A7Q-FPLI-YpURHk",
            authDomain: "realtime-database-f4102.firebaseapp.com",
            databaseURL: "https://realtime-database-f4102-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "realtime-database-f4102",
            appId: "1:433163571380:web:ad65f64f7b5f892c5d07e1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // Identity
        const myId = Math.random().toString(36).substring(7);
        let myName = localStorage.getItem('p2p_name') || prompt("Nama Anda:") || "User_" + myId;
        localStorage.setItem('p2p_name', myName);
        
        document.getElementById('myIdDisplay').innerText = myId;
        document.getElementById('userNameDisplay').innerText = myName;
        document.getElementById('avatar').innerText = myName[0];

        const peers = {};

        function addLog(txt) {
            const lb = document.getElementById('logBox');
            lb.innerHTML += `<br>> ${txt}`;
            lb.scrollTop = lb.scrollHeight;
        }

        // 2. SIGNALING (Penerima Sinyal)
        db.ref('signals/' + myId).on('child_added', async (snap) => {
            const data = snap.val();
            addLog(`Sinyal masuk: ${data.type} dari ${data.from}`);
            
            if (data.type === 'offer') {
                const pc = setupPeer(data.from, false);
                await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                db.ref('signals/' + data.from).push({ from: myId, type: 'answer', sdp: ans });
            } else if (data.type === 'answer') {
                if (peers[data.from]) await peers[data.from].pc.setRemoteDescription(new RTCSessionDescription(data.sdp));
            } else if (data.type === 'ice') {
                if (peers[data.from]) peers[data.from].pc.addIceCandidate(new RTCIceCandidate(data.ice));
            }
            snap.ref.remove();
        });

        // 3. PRESENCE (Daftar Online)
        db.ref('presence/' + myId).set({ name: myName, time: Date.now() });
        db.ref('presence/' + myId).onDisconnect().remove();

        db.ref('presence').on('value', (snap) => {
            const list = snap.val() || {};
            const onlineCount = Object.keys(list).length;
            document.getElementById('connCount').innerText = `${onlineCount} User Online`;
            
            Object.keys(list).forEach(peerId => {
                if (peerId !== myId && !peers[peerId]) {
                    addLog(`Menemukan peer baru: ${peerId}. Mengirim penawaran...`);
                    setupPeer(peerId, true);
                }
            });
        });

        // 4. WEBRTC ENGINE
        function setupPeer(peerId, isOffer) {
            const pc = new RTCPeerConnection({
                iceServers: [{ urls: "stun:stun.l.google.com:19302" }, { urls: "stun:stun1.l.google.com:19302" }]
            });
            peers[peerId] = { pc, dc: null };

            pc.onicecandidate = (e) => {
                if (e.candidate) {
                    db.ref('signals/' + peerId).push({ from: myId, type: 'ice', ice: e.candidate });
                }
            };

            pc.onconnectionstatechange = () => addLog(`Status Koneksi: ${pc.connectionState}`);

            if (isOffer) {
                const dc = pc.createDataChannel("chat");
                setupDC(dc, peerId);
                pc.createOffer().then(o => {
                    pc.setLocalDescription(o);
                    db.ref('signals/' + peerId).push({ from: myId, type: 'offer', sdp: o });
                });
            } else {
                pc.ondatachannel = (e) => setupDC(e.channel, peerId);
            }
            return pc;
        }

        function setupDC(dc, peerId) {
            peers[peerId].dc = dc;
            dc.onopen = () => {
                addLog(`Koneksi P2P Berhasil ke ${peerId}!`);
                updateStatus();
            };
            dc.onclose = () => {
                addLog(`Koneksi ke ${peerId} terputus.`);
                delete peers[peerId];
                updateStatus();
            };
            dc.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                appendMsg(msg.u, msg.t, 'inbound');
            };
        }

        function updateStatus() {
            const active = Object.values(peers).filter(p => p.dc?.readyState === 'open').length;
            const btn = document.getElementById('sendBtn');
            const st = document.getElementById('status');
            
            if (active > 0) {
                st.innerText = "Terhubung ke " + active + " peer";
                st.className = "text-[10px] text-yellow-300 font-bold animate-pulse";
                btn.disabled = false;
            } else {
                st.innerText = "Mencari koneksi...";
                st.className = "text-[10px] opacity-80 italic";
                btn.disabled = true;
            }
        }

        function sendTxt() {
            const inp = document.getElementById('msgInp');
            if (!inp.value.trim()) return;
            
            const msgData = { u: myName, t: inp.value };
            let sent = 0;
            
            Object.values(peers).forEach(p => {
                if (p.dc?.readyState === 'open') {
                    p.dc.send(JSON.stringify(msgData));
                    sent++;
                }
            });

            appendMsg(myName, inp.value, 'outbound');
            inp.value = "";
        }

        function appendMsg(user, text, side) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            
            if (side === 'outbound') {
                div.className = "bg-[#dcf8c6] p-2 rounded-lg self-end max-w-[85%] shadow-sm text-sm mb-1 border-l-4 border-[#00a884]";
            } else {
                div.className = "bg-white p-2 rounded-lg self-start max-w-[85%] shadow-sm text-sm mb-1 border-l-4 border-blue-400";
            }
            
            div.innerHTML = `<span class="text-[10px] font-bold block opacity-60">${user}</span>${text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }

        document.getElementById('msgInp').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendTxt(); });
    </script>
</body>
</html>
